<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪吃蛇 - Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
  }

  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 600px;
    padding: 0 4px;
  }

  .title {
    color: #a0d8a0;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .score-panel {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .score-box {
    background: #16213e;
    border: 1px solid #2a3a5e;
    border-radius: 10px;
    padding: 8px 18px;
    text-align: center;
  }

  .score-label {
    color: #8899aa;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .score-value {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
  }

  .best-value {
    color: #ffcc00;
    font-size: 22px;
    font-weight: 700;
  }

  canvas {
    border: 2px solid #2a3a5e;
    border-radius: 6px;
    display: block;
    background: #0f0f1a;
  }

  .controls-hint {
    color: #556677;
    font-size: 13px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .controls-hint span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .key {
    background: #16213e;
    border: 1px solid #2a3a5e;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 12px;
    color: #aabbcc;
    font-family: inherit;
  }

  /* 移动端虚拟方向键 */
  .mobile-controls {
    display: none;
    position: relative;
    width: 180px;
    height: 180px;
  }

  .dpad-btn {
    position: absolute;
    width: 54px;
    height: 54px;
    border: 2px solid #3a4a6e;
    border-radius: 12px;
    background: #16213ecc;
    color: #aabbcc;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: background 0.1s;
  }

  .dpad-btn:active {
    background: #2a4a3e;
  }

  .dpad-up    { top: 0;    left: 63px; }
  .dpad-down  { bottom: 0; left: 63px; }
  .dpad-left  { top: 63px; left: 0;    }
  .dpad-right { top: 63px; right: 0;   }

  @media (max-width: 640px), (hover: none) and (pointer: coarse) {
    .mobile-controls { display: block; }
    .controls-hint { display: none; }
    canvas { max-width: 95vw; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="header">
    <div class="title">🐍 贪吃蛇</div>
    <div class="score-panel">
      <div class="score-box">
        <div class="score-label">分数</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">最高</div>
        <div class="best-value" id="bestScore">0</div>
      </div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <div class="controls-hint">
    <span><span class="key">↑↓←→</span> 或 <span class="key">WASD</span> 移动</span>
    <span><span class="key">空格</span> 暂停</span>
    <span><span class="key">R</span> 重新开始</span>
  </div>

  <!-- 移动端虚拟方向键 -->
  <div class="mobile-controls" id="mobileControls">
    <button class="dpad-btn dpad-up"    id="btnUp">▲</button>
    <button class="dpad-btn dpad-down"  id="btnDown">▼</button>
    <button class="dpad-btn dpad-left"  id="btnLeft">◀</button>
    <button class="dpad-btn dpad-right" id="btnRight">▶</button>
  </div>

  <!-- 游戏结束弹层 -->
  <div id="overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:10; flex-direction:column; align-items:center; justify-content:center; gap:16px;">
    <div id="overlayTitle" style="font-size:36px; font-weight:700; color:#ff6464;">游戏结束</div>
    <div id="overlayScore" style="font-size:20px; color:#ccc;"></div>
    <button id="overlayBtn" style="margin-top:12px; padding:12px 36px; font-size:18px; border:none; border-radius:8px; background:#4a8; color:#fff; cursor:pointer; letter-spacing:1px;">🔄 再来一局</button>
  </div>
</div>

<script>
// === 常量 ===
const CELL = 20;
const COLS = 30;
const ROWS = 20;
const W = COLS * CELL;
const H = ROWS * CELL;
const FPS = 10;

// === DOM 元素 ===
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('bestScore');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayScore = document.getElementById('overlayScore');

// === 游戏状态 ===
let snake, food, direction, nextDirection;
let score, bestScore, gameOver, paused, gameLoop;
let won = false;

// 从 localStorage 读取最高分
bestScore = parseInt(localStorage.getItem('snakeBest') || '0');
bestEl.textContent = bestScore;

// === 初始化 ===
function init() {
  const sx = Math.floor(COLS / 2);
  const sy = Math.floor(ROWS / 2);
  snake = [
    { x: sx, y: sy },
    { x: sx - 1, y: sy },
    { x: sx - 2, y: sy },
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  gameOver = false;
  paused = false;
  won = false;
  scoreEl.textContent = '0';
  overlay.style.display = 'none';
  spawnFood();
}

function spawnFood() {
  const occupied = new Set(snake.map(p => `${p.x},${p.y}`));
  const available = [];
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      if (!occupied.has(`${x},${y}`)) available.push({ x, y });
    }
  }
  if (available.length === 0) {
    // 通关！
    food = null;
    endGame(true);
  } else {
    food = available[Math.floor(Math.random() * available.length)];
  }
}

function endGame(isWin = false) {
  gameOver = true;
  won = isWin;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('snakeBest', bestScore);
    bestEl.textContent = bestScore;
  }
  overlay.style.display = 'flex';
  overlayTitle.textContent = isWin ? '🎉 恭喜通关！' : '游戏结束';
  overlayTitle.style.color = isWin ? '#5f5' : '#ff6464';
  overlayScore.textContent = `最终分数: ${score}`;
  clearInterval(gameLoop);
}

// === 游戏逻辑 ===
function update() {
  if (gameOver || paused) return;

  // 应用排队的方向
  direction = nextDirection;

  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  // 撞墙
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return endGame(false);
  }

  // 撞自己
  if (snake.some(p => p.x === head.x && p.y === head.y)) {
    return endGame(false);
  }

  snake.unshift(head);

  // 吃到食物
  if (food && head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    spawnFood();
  } else {
    snake.pop();
  }
}

// === 绘制 ===
function draw() {
  // 背景
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, W, H);

  // 网格线
  ctx.strokeStyle = '#1a1a30';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= W; x += CELL) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += CELL) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // 蛇身
  snake.forEach((p, i) => {
    const x = p.x * CELL, y = p.y * CELL;
    const pad = 1.5;
    ctx.fillStyle = i === 0 ? '#64c864' : '#3ca03c';
    ctx.beginPath();
    ctx.roundRect(x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, 4);
    ctx.fill();

    // 蛇头的眼睛
    if (i === 0) {
      ctx.fillStyle = '#fff';
      const ex = x + CELL / 2, ey = y + CELL / 2;
      const odx = direction.x * 3, ody = direction.y * 3;
      ctx.beginPath();
      ctx.arc(ex + odx - 2 * Math.abs(direction.y), ey + ody - 2 * Math.abs(direction.x), 2.5, 0, Math.PI * 2);
      ctx.arc(ex + odx + 2 * Math.abs(direction.y), ey + ody + 2 * Math.abs(direction.x), 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // 食物（带脉冲动画）
  if (food) {
    const fx = food.x * CELL + CELL / 2;
    const fy = food.y * CELL + CELL / 2;
    const pulse = 1 + 0.15 * Math.sin(Date.now() / 150);
    const r = (CELL / 2 - 2) * pulse;

    // 光晕
    ctx.fillStyle = 'rgba(255,80,80,0.25)';
    ctx.beginPath();
    ctx.arc(fx, fy, r + 3, 0, Math.PI * 2);
    ctx.fill();

    // 主体
    ctx.fillStyle = '#ff5050';
    ctx.beginPath();
    ctx.arc(fx, fy, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // 暂停提示
  if (paused && !gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ccc';
    ctx.font = 'bold 28px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂停', W / 2, H / 2 + 8);
    ctx.textAlign = 'start';
  }
}

function tick() {
  update();
  draw();
}

// === 输入处理 ===
function setDir(dx, dy) {
  if (gameOver) return;
  // 禁止反向
  if (dx === -direction.x && dy === -direction.y) return;
  nextDirection = { x: dx, y: dy };
  // 如果暂停中，按键解除暂停
  if (paused) paused = false;
}

document.addEventListener('keydown', e => {
  if (gameOver) {
    if (e.key === 'r' || e.key === 'R') { init(); startLoop(); }
    return;
  }

  switch (e.key) {
    case 'ArrowUp':    case 'w': case 'W': e.preventDefault(); setDir(0, -1); break;
    case 'ArrowDown':  case 's': case 'S': e.preventDefault(); setDir(0, 1);  break;
    case 'ArrowLeft':  case 'a': case 'A': e.preventDefault(); setDir(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); setDir(1, 0);  break;
    case ' ': paused = !paused; e.preventDefault(); break;
  }
});

// 移动端虚拟方向键
['btnUp','btnDown','btnLeft','btnRight'].forEach(id => {
  const btn = document.getElementById(id);
  btn.addEventListener('pointerdown', e => {
    e.preventDefault();
    const dirs = { btnUp: [0,-1], btnDown: [0,1], btnLeft: [-1,0], btnRight: [1,0] };
    setDir(...dirs[id]);
  });
});

// 触摸滑动支持
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 20) return; // 太短忽略
  if (absDx > absDy) {
    setDir(dx > 0 ? 1 : -1, 0);
  } else {
    setDir(0, dy > 0 ? 1 : -1);
  }
  touchStart = null;
});

// 弹层按钮
document.getElementById('overlayBtn').addEventListener('click', () => {
  init();
  startLoop();
});

// === 启动循环 ===
function startLoop() {
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, 1000 / FPS);
}

init();
startLoop();
</script>
</body>
</html>
